name: Signal Detection
on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

jobs:
  detect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run signal detection
        run: python -u scripts/signal_detection.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHONUNBUFFERED: '1'

      - name: Commit candidates.json and star_counts.json if changed
        run: |
          if git diff --quiet candidates.json star_counts.json 2>/dev/null; then
            echo "No changes to candidates.json or star_counts.json"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add candidates.json star_counts.json
            git commit -m "chore: update candidates.json and star_counts.json [skip ci]"
            git push
          fi
