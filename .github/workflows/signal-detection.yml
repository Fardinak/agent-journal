name: Signal Detection
on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

jobs:
  discover:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run watchlist monitor
        run: python -u scripts/watchlist_monitor.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHONUNBUFFERED: '1'

      - name: Run discover trending
        run: python -u scripts/discover_trending.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHONUNBUFFERED: '1'

      - name: Run discover registry
        run: python -u scripts/discover_registry.py
        env:
          PYTHONUNBUFFERED: '1'

      - name: Run discover dependents
        run: python -u scripts/discover_dependents.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHONUNBUFFERED: '1'

      - name: Run score candidates
        run: python -u scripts/score_candidates.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHONUNBUFFERED: '1'

      - name: Commit star_counts.json if changed
        run: |
          if git diff --quiet star_counts.json 2>/dev/null; then
            echo "No changes to star_counts.json"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add star_counts.json
            git commit -m "chore: update star_counts.json [skip ci]"
            git push
          fi

      - name: Commit candidates files if changed
        run: |
          git status --porcelain
          if [ -n "$(git status --porcelain | grep -E '^(A|M).*candidates')" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add candidates*.json
            git commit -m "chore: update candidates from discovery [skip ci]"
            git push
          else
            echo "No candidate changes"
          fi