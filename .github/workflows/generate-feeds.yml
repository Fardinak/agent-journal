name: Generate Feeds
on:
  push:
    branches: [main]
    paths:
      - 'entries/**'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install python-frontmatter

      - name: Generate feeds
        run: python scripts/generate_feeds.py

      - name: Commit feeds if changed
        run: |
          if git diff --quiet feeds/ 2>/dev/null; then
            echo "No changes to feeds/"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add feeds/
            git commit -m "chore: regenerate feeds [skip ci]"
            git push
          fi
