name: Draft Entry
on:
  repository_dispatch:
    types: [new_candidate]
  workflow_dispatch:
    inputs:
      candidate_name:
        description: 'Name of the candidate to draft'
        required: true
        type: string

jobs:
  draft:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests openai python-frontmatter

      - name: Generate draft entry
        run: |
          CANDIDATE="${{ github.event.client_payload.name || inputs.candidate_name }}"
          echo "Generating draft for: $CANDIDATE"
          python scripts/ai_draft.py --candidate "$CANDIDATE"

      - name: Create branch and commit
        id: create_branch
        run: |
          CANDIDATE="${{ github.event.client_payload.name || inputs.candidate_name }}"
          CANDIDATE_SLUG=$(echo "$CANDIDATE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-//;s/-$//')
          BRANCH="draft/${CANDIDATE_SLUG}"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add entries/
          git commit -m "draft: add entry for $CANDIDATE"
          git push origin "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Open PR
        run: |
          CANDIDATE="${{ github.event.client_payload.name || inputs.candidate_name }}"
          CANDIDATE_SLUG=$(echo "$CANDIDATE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-//;s/-$//')
          BRANCH="draft/${CANDIDATE_SLUG}"
          
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Draft entry: $CANDIDATE" \
            --body "AI-generated draft entry for **$CANDIDATE**. See the editorial checklist in the PR template." \
            --label "draft"

        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}