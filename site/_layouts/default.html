<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="{{ '/' | relative_url }}" class="logo">Agent Journal</a>
      <nav>
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="https://github.com/{{ site.github.repository_nwo }}">GitHub</a>
      </nav>
    </div>
  </header>

  <main class="container">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Agent Journal — <a href="{{ site.url }}/feeds/index.json">JSON feed</a> · <a href="https://github.com/{{ site.github.repository_nwo }}">Source</a></p>
      <p>MIT License</p>
    </div>
  </footer>
</body>
</html>
